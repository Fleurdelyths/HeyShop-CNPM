<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/register.css" />
</head>
<body>
    <h2 class="text-center fw-bold mt-4">
        Đăng ký thành viên
    </h2>

    <div class="register-box">
        <form id="registerForm" method="post">
            <div class="container">
                <!-- TÊN ĐĂNG NHẬP -->
                <div class="row align-items-center mb-4">
                    <div class="col-md-3">
                        <label>Tên đăng nhập</label>
                    </div>
                    <div class="col-md-7">
                        <input type="text" id="username" class="form-control custom-input">
                    </div>
                </div>
                <!-- MẬT KHẨU -->
                <div class="row align-items-center mb-3">
                    <div class="col-md-3">
                        <label>Mật khẩu</label>
                    </div>
                    <div class="col-md-7">
                        <input type="password" id="password" class="form-control custom-input">
                    </div>
                </div>
                <hr>
                <!-- THÔNG TIN -->
                <h4 class="fw-bold ms-4 mb-4">
                    Thông tin cá nhân
                </h4>
                <!-- HỌ TÊN -->
                <div class="row align-items-center mb-4">
                    <div class="col-md-3">
                        <label>Họ tên</label>
                    </div>
                    <div class="col-md-7">
                        <input type="text" id="fullname" class="form-control custom-input">
                    </div>
                </div>
                <!-- GIỚI TÍNH -->
                <div class="row align-items-center mb-4">
                    <div class="col-md-3">
                        <label>Giới tính</label>
                    </div>
                    <div class="col-md-7 d-flex gap-5">
                        <div>
                            <label class="me-2">Nam</label>
                            <input type="radio" name="gender" value="Nam">
                        </div>
                        <div>
                            <label class="me-2">Nữ</label>
                            <input type="radio" name="gender" value="Nữ">
                        </div>
                    </div>
                </div>
                <!-- NGÀY SINH -->
                <div class="row align-items-center mb-4">
                    <div class="col-md-3">
                        <label>Ngày sinh</label>
                    </div>
                    <div class="col-md-7">
                        <input type="date" id="birthday" class="form-control custom-input">
                    </div>
                </div>
                <!-- EMAIL -->
                <div class="row align-items-center mb-4">
                    <div class="col-md-3">
                        <label>Email</label>
                    </div>
                    <div class="col-md-7">
                        <input  type="email" id="email" class="form-control custom-input">
                    </div>
                </div>
                <!-- ĐIỆN THOẠI -->
                <div class="row align-items-center mb-5">
                    <div class="col-md-3">
                        <label>Điện thoại</label>
                    </div>
                    <div class="col-md-7">
                        <input  type="text" id="phone" class="form-control custom-input">
                    </div>
                </div>
                <!-- BUTTON -->
                <div class="text-center">
                    <button type="submit" class="custom-btn me-5">
                        Đăng ký
                    </button>

                    <button type="reset" class="custom-btn">
                        Xóa
                    </button>
                </div>
                <div id="registerMessage"></div>
            </div>
        </form>
    </div>
    <script src="/js/register.js"></script>
</body>
</html>
